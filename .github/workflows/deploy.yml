name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  APP_NAME: sts1-data
  LOCATION: westus2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure (ACR + Environment)
        id: infra
        run: |
          RG="${APP_NAME}-rg"
          az group create -n "$RG" -l "$LOCATION" > /dev/null

          DEPLOY_JSON=$(az deployment group create \
            -g "$RG" \
            -f infra/main.bicep \
            -p location="$LOCATION" appName="$APP_NAME" \
            -o json)

          ACR_NAME=$(echo "$DEPLOY_JSON" | jq -r '.properties.outputs.acrName.value')
          ACR_LOGIN=$(echo "$DEPLOY_JSON" | jq -r '.properties.outputs.acrLoginServer.value')
          ENV_NAME=$(echo "$DEPLOY_JSON" | jq -r '.properties.outputs.envName.value')
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login=$ACR_LOGIN" >> "$GITHUB_OUTPUT"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          ACR_NAME="${{ steps.infra.outputs.acr_name }}"
          ACR_LOGIN="${{ steps.infra.outputs.acr_login }}"
          TAG="${GITHUB_SHA::8}"

          az acr login -n "$ACR_NAME"
          docker build -t "$ACR_LOGIN/$APP_NAME:$TAG" -t "$ACR_LOGIN/$APP_NAME:latest" .
          docker push "$ACR_LOGIN/$APP_NAME:$TAG"
          docker push "$ACR_LOGIN/$APP_NAME:latest"

      - name: Deploy container app
        run: |
          RG="${APP_NAME}-rg"
          ACR_NAME="${{ steps.infra.outputs.acr_name }}"
          ACR_LOGIN="${{ steps.infra.outputs.acr_login }}"
          ENV_NAME="${{ steps.infra.outputs.env_name }}"
          TAG="${GITHUB_SHA::8}"
          IMAGE="$ACR_LOGIN/$APP_NAME:$TAG"

          # Get ACR credentials
          ACR_USER=$(az acr credential show -n "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "$ACR_NAME" --query "passwords[0].value" -o tsv)

          # Create or update the container app
          if az containerapp show -n "$APP_NAME" -g "$RG" &>/dev/null; then
            az containerapp update \
              -n "$APP_NAME" \
              -g "$RG" \
              --image "$IMAGE"
          else
            az containerapp create \
              -n "$APP_NAME" \
              -g "$RG" \
              --environment "$ENV_NAME" \
              --image "$IMAGE" \
              --registry-server "$ACR_LOGIN" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --target-port 4321 \
              --ingress external \
              --cpu 0.25 \
              --memory 0.5Gi \
              --min-replicas 0 \
              --max-replicas 1
          fi
