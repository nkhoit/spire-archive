name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  APP_NAME: sts1-data
  LOCATION: westus2

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.infra.outputs.acr_name }}
      acr_login: ${{ steps.infra.outputs.acr_login }}
      env_name: ${{ steps.infra.outputs.env_name }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure (ACR + Environment)
        id: infra
        run: |
          RG="${APP_NAME}-rg"
          az group create -n "$RG" -l "$LOCATION" > /dev/null

          DEPLOY_JSON=$(az deployment group create \
            -g "$RG" \
            -f infra/main.bicep \
            -p location="$LOCATION" appName="$APP_NAME" \
            -o json)

          ACR_NAME=$(echo "$DEPLOY_JSON" | jq -r '.properties.outputs.acrName.value')
          ACR_LOGIN=$(echo "$DEPLOY_JSON" | jq -r '.properties.outputs.acrLoginServer.value')
          ENV_NAME=$(echo "$DEPLOY_JSON" | jq -r '.properties.outputs.envName.value')
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login=$ACR_LOGIN" >> "$GITHUB_OUTPUT"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Set tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          ACR_NAME="${{ steps.infra.outputs.acr_name }}"
          ACR_LOGIN="${{ steps.infra.outputs.acr_login }}"
          TAG="${{ steps.tag.outputs.tag }}"

          az acr login -n "$ACR_NAME"
          docker build -t "$ACR_LOGIN/$APP_NAME:$TAG" -t "$ACR_LOGIN/$APP_NAME:latest" .
          docker push "$ACR_LOGIN/$APP_NAME:$TAG"
          docker push "$ACR_LOGIN/$APP_NAME:latest"

  staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to staging
        run: |
          az containerapp update \
            -n "${APP_NAME}-staging" \
            -g "${APP_NAME}-rg" \
            --image "${{ needs.build.outputs.acr_login }}/$APP_NAME:${{ needs.build.outputs.tag }}"

  production:
    needs: [build, staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to production
        run: |
          az containerapp update \
            -n "$APP_NAME" \
            -g "${APP_NAME}-rg" \
            --image "${{ needs.build.outputs.acr_login }}/$APP_NAME:${{ needs.build.outputs.tag }}"
